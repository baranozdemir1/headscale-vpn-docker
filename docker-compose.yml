services:
  headscale:
    image: headscale/headscale:0.28.0
    restart: unless-stopped
    command: serve
    volumes:
      - ../files/config.yaml:/etc/headscale/config.yaml:ro
      - headscale-data:/var/lib/headscale
    healthcheck:
      test:
        - CMD
        - headscale
        - health
      interval: 30s
      timeout: 5s
      retries: 3

  headplane:
    image: ghcr.io/tale/headplane:latest
    restart: unless-stopped
    depends_on:
      - headscale
    volumes:
      - ../files/headplane-config.yaml:/etc/headplane/config.yaml:ro
      - ../files/config.yaml:/etc/headscale/config.yaml:ro
      - headplane-data:/var/lib/headplane
      - /var/run/docker.sock:/var/run/docker.sock:ro

  tailscale-exit-node:
    image: tailscale/tailscale:v1.96.5
    hostname: vps-exit-node
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --login-server=${HEADSCALE_URL} --advertise-exit-node --accept-routes
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: false
    volumes:
      - tailscale-exit-state:/var/lib/tailscale
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

volumes:
  headscale-data: null
  headplane-data: null
  tailscale-exit-state: null
