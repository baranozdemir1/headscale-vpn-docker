server:
  host: 0.0.0.0
  port: 3000
  cookie_secret: ""
  cookie_secure: true

headscale:
  url: http://headscale:8080
  api_key: ""
  public_url: "https://vpn.xxx.com"
  config_path: "/etc/headscale/config.yaml"
  config_strict: true

integration:
  docker:
    enabled: true
    container_name: "headscale"
    socket: "unix:///var/run/docker.sock"
